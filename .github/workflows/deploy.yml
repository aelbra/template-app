name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_to:
        description: "Promover para"
        required: true
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_NAME: NOME_DO_APP

jobs:
  build:
    name: Build
    runs-on: [self-hosted, ulbra]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Definir tag
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    name: Deploy Dev
    needs: build
    if: github.event_name == 'push'
    runs-on: [self-hosted, ulbra]
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          export IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          docker stack deploy -c docker-compose.yml ${{ env.APP_NAME }}-dev

  deploy-staging:
    name: Deploy Staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.promote_to == 'staging'
    runs-on: [self-hosted, ulbra]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          docker stack deploy -c docker-compose.yml ${{ env.APP_NAME }}-staging

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.promote_to == 'production'
    runs-on: [self-hosted, ulbra]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          docker stack deploy -c docker-compose.yml ${{ env.APP_NAME }}-production
