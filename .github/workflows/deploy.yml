name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_to:
        description: "Promover para qual ambiente"
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Tag da imagem (SHA curto). Default = última do dev."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build
    runs-on: [self-hosted, ulbra]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag (SHA curto)
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    name: Deploy Dev
    needs: build
    if: github.event_name == 'push'
    runs-on: [self-hosted, ulbra]
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          ENV_SLUG: dev
          API_HOST: ${{ vars.API_HOST_DEV }}
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
        run: |
          docker stack deploy -c deploy/docker-compose.swarm.yml ${{ vars.APP_NAME }}-dev
      - name: Diagnostics on failure
        if: failure()
        run: |
          docker stack ps ${{ vars.APP_NAME }}-dev --no-trunc | head -20 || true
          docker service logs ${{ vars.APP_NAME }}-dev_api --tail 50 || true

  deploy-staging:
    name: Deploy Staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.promote_to == 'staging'
    runs-on: [self-hosted, ulbra]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
      - name: Deploy
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          ENV_SLUG: staging
          API_HOST: ${{ vars.API_HOST_STAGING }}
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        run: |
          docker stack deploy -c deploy/docker-compose.swarm.yml ${{ vars.APP_NAME }}-staging

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.promote_to == 'production'
    runs-on: [self-hosted, ulbra]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "Tag obrigatória em produção (informe SHA curto)" >&2
            exit 1
          fi
      - name: Deploy
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          ENV_SLUG: prod
          API_HOST: ${{ vars.API_HOST_PROD }}
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        run: |
          docker stack deploy -c deploy/docker-compose.swarm.yml ${{ vars.APP_NAME }}-prod
