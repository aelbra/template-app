services:
  api:
    image: ${API_IMAGE}
    networks:
      - proxy
      - internal
      - monitoring
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${API_PORT:-3000}
      # Connection strings (preencher conforme stack)
      # - DATABASE_URL=${DATABASE_URL}
      # OpenTelemetry — telemetria via SigNoz (signoz.ulbra.ai)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=${APP_NAME}-api
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=${ENV_SLUG}
    deploy:
      replicas: ${API_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512M}
          cpus: "${API_CPU_LIMIT:-0.5}"
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=proxy"
        - "traefik.http.routers.${APP_NAME}-api-${ENV_SLUG}.rule=Host(`${API_HOST}`)"
        - "traefik.http.routers.${APP_NAME}-api-${ENV_SLUG}.entrypoints=websecure,internal"
        - "traefik.http.routers.${APP_NAME}-api-${ENV_SLUG}.tls=true"
        - "traefik.http.routers.${APP_NAME}-api-${ENV_SLUG}.tls.certresolver=letsencrypt"
        - "traefik.http.services.${APP_NAME}-api-${ENV_SLUG}.loadbalancer.server.port=${API_PORT:-3000}"
        - "homepage.group=${HOMEPAGE_GROUP:-Aplicações}"
        - "homepage.name=${APP_NAME}-${ENV_SLUG}"
        - "homepage.icon=${HOMEPAGE_ICON:-mdi-application}"
        - "homepage.href=https://${API_HOST}"
        - "homepage.description=${HOMEPAGE_DESCRIPTION:-Aplicação ULBRA}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${API_PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

